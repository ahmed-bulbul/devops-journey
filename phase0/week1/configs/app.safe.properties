server.port=8080
server.host=localhost
spring.application.name=user-service

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/userdb
spring.datasource.username=root
spring.datasource.password=REDACTED
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.file.name=/var/log/user-service/app.log
logging.file.max-size=100MB
logging.file.max-history=30

# Redis Cache
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=

# JWT
jwt.secret=my-super-secret-key-change-in-production
jwt.expiration=86400

# AWS
aws.region=ap-southeast-1
aws.s3.bucket=my-app-bucket
aws.s3.prefix=uploads/

# App config
app.max-login-attempts=5
app.session-timeout=3600
app.debug-mode=false
app.environment=development
