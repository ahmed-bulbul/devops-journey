# nginx.conf — Full stack reverse proxy for 3 microservices
# Routes:
#   /users/*    → user-service:8081
#   /orders/*   → order-service:8082
#   /products/* → product-service:8083

user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;

    # Upstream definitions (Docker DNS resolves service names)
    upstream user_service {
        server user-service:8081;
    }

    upstream order_service {
        server order-service:8082;
    }

    upstream product_service {
        server product-service:8083;
    }

    server {
        listen 80;
        server_name localhost;

        # ─── Health check ────────────────────────────────────────────────────
        location /health {
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # ─── User Service ─────────────────────────────────────────────────────
        location /users/ {
            proxy_pass         http://user_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ─── Order Service ────────────────────────────────────────────────────
        location /orders/ {
            proxy_pass         http://order_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ─── Product Service ──────────────────────────────────────────────────
        location /products/ {
            proxy_pass         http://product_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ─── 404 for anything else ───────────────────────────────────────────
        location / {
            return 404 "Service not found. Available: /users/ /orders/ /products/\n";
            add_header Content-Type text/plain;
        }
    }
}
